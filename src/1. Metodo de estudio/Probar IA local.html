<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Exámenes - LM Studio</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&display=swap');
    
    :root{
      --font-sans:'Inter','DM Sans',sans-serif;
      --font-serif:'Playfair Display',serif;
      --font-mono:'DM Mono',monospace;

      --violet:#7766c9;
      --violet-hover:#6656b3;
      --violet-soft-text:#8f79da;
      --lav:#d9ceff;
      --peach:#ffdcd2;

      --bg-app:#f7f6fc;
      --bg-surface:#fff;
      --bg-surface-alt:#faf9fd;
      --bg-soft:#eeeaff;
      --bg-hero:#e9e5fb;
      --bg-hover:#f5f3fc;
      --bg-elevated:#fff;

      --ink:#303249;
      --muted:#777991;
      --muted-2:#88869c;

      --line:#e8e6f1;
      --line-soft:#e4e1f2;
      --line-accent:#c9bfeb;

      --success:#4a8a73;
      --success-bg:#effaf5;
      --success-border:#cde9dd;
      --danger:#b6666c;
      --danger-bg:#fdeceb;
      --danger-border:#f5d9d2;
      
      --shadow-card:0 9px 20px rgba(112,102,165,.09);
    }

    [data-theme="dark"]{
      --bg-app:#131220;
      --bg-surface:#1d1c2b;
      --bg-surface-alt:#211f31;
      --bg-soft:#282540;
      --bg-hero:#242040;
      --bg-hover:#242235;
      --bg-elevated:#201e2f;

      --ink:#eeedf6;
      --muted:#a6a3bf;
      --muted-2:#8f8caa;

      --line:#312e46;
      --line-soft:#2a2739;
      --line-accent:#4a3f7a;

      --success:#7cc9a5;
      --success-bg:#17342a;
      --success-border:#245240;
      --danger:#e6969b;
      --danger-bg:#3a2228;
      --danger-border:#4d2b32;
    }

    *,*::before,*::after{transition:background-color .25s ease,border-color .25s ease,color .25s ease,box-shadow .25s ease}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg-app);color:var(--ink);font-family:var(--font-sans)}
    button,input,textarea,select{font:inherit;color:inherit}
    button{cursor:pointer;border:0}

    .app-shell{min-height:100vh;display:flex;background:var(--bg-app); justify-content: center;}
    main{width:100%;max-width:900px;padding:38px 20px 60px;background:var(--bg-app)}
    
    h1{font:600 34px 'Playfair Display',serif;margin-bottom:28px;letter-spacing:-1px}
    h1 span{color:var(--violet-soft-text);font-size:23px}
    
    .focus-card{background:var(--bg-hero);border-radius:22px;display:flex;overflow:hidden;position:relative;padding:39px 47px;margin-bottom:30px}
    .focus-copy h2{font:600 24px/1.15 'Playfair Display',serif;letter-spacing:-.6px;margin-bottom:20px; margin-top:0;}
    
    .primary{border-radius:9px;background:var(--violet);color:#fff;padding:12px 17px;font-weight:600;font-size:12px;box-shadow:0 5px 14px rgba(98,80,168,.2); transition:.2s;}
    .primary:hover:not(:disabled){background:var(--violet-hover); transform:translateY(-2px);}
    .primary:disabled{opacity: 0.5; cursor: not-allowed; transform: none;}

    .method-card{border:1px solid var(--line);background:var(--bg-surface);border-radius:14px;padding:30px;text-align:center;position:relative;display:flex;flex-direction:column;transition:.2s}
    
    .writing-space{width:100%;margin-top:30px}
    .writing-space textarea{width:100%;height:350px;resize:vertical;border:1px solid var(--line-soft);border-radius:12px;background:var(--bg-surface-alt);color:var(--ink);padding:17px;outline-color:var(--violet);font-size:13px;line-height:1.6; font-family: 'DM Mono', monospace;}
    
    .key-button{background:var(--bg-surface);border:1px solid var(--line-soft);border-radius:10px;color:var(--muted);padding:10px 14px;font-size:12px;font-weight:600;}
    .key-button:hover{border-color:var(--violet); color:var(--violet);}

    .config-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-group label {
      font: 500 11px 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .lumina-input {
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 12px 16px;
      background: var(--bg-surface-alt);
      color: var(--ink);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .lumina-input:focus {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px rgba(119, 102, 201, 0.12);
    }
    
    .drop-zone {
      border: 2px dashed var(--line-accent);
      background: var(--bg-surface-alt);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .drop-zone:hover {
      background: var(--bg-hover);
      border-color: var(--violet);
    }
    .file-icon { font-size: 32px; margin-bottom: 12px; }
    
    .status-badge {
      font: 500 11px 'DM Mono', monospace;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--bg-soft);
      color: var(--violet);
      transition: 0.3s ease;
    }
    .status-badge.success { background: var(--success-bg); color: var(--success); }
    .status-badge.error { background: var(--danger-bg); color: var(--danger); }
  </style>
</head>
<body>

<div class="app-shell">
  <main>
    <header style="display: flex; justify-content: space-between; align-items: center;">
      <h1>Generador de Exámenes <span>LM Studio</span></h1>
    </header>

    <div class="focus-card">
      <div style="width: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="margin: 0;">Configuración de Conexión</h2>
          <button class="key-button" onclick="fetchModels()">↻ Cargar Modelos</button>
        </div>
        
        <div class="config-grid">
          <div class="input-group">
            <label>URL del Servidor:</label>
            <input type="text" id="serverIp" class="lumina-input" value="http://localhost:1234">
          </div>
          <div class="input-group">
            <label>API Key (Opcional):</label>
            <input type="text" id="apiKey" class="lumina-input" placeholder="lm-studio" value="lm-studio">
          </div>
          <div class="input-group">
            <label>Modelo Activo:</label>
            <select id="modelSelect" class="lumina-input" style="cursor: pointer;">
              <option value="">-- Seleccionar modelo --</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="method-card">
      <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <div class="file-icon">📄</div>
        <strong style="font-size: 14px;">Haz clic aquí o arrastra tus apuntes</strong>
        <span style="display: block; font-size: 11px; color: var(--muted); margin-top: 6px;">Archivos soportados: .txt, .md, .js, .json</span>
        <p id="fileName" style="margin-top: 14px; font: 500 12px 'DM Mono'; color: var(--violet);"></p>
        <input type="file" id="fileInput" accept=".txt,.md,.json,.js,.csv,.html,.css" onchange="handleFileSelect(event)" style="display: none;">
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px;">
        <span class="status-badge" id="statusText">Esperando archivo...</span>
        <button class="primary" id="generateBtn" onclick="processFile()" disabled>Generar Examen</button>
      </div>
    </div>

    <div class="writing-space">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h3 style="font: 600 18px 'Playfair Display', serif; margin: 0;">Array JavaScript Generado</h3>
        <button class="key-button" onclick="copyOutput()">Copiar Código</button>
      </div>
      <textarea id="outputText" readonly placeholder="const PREGUNTAS = [ ... ];"></textarea>
    </div>

  </main>
</div>

<script>
  let loadedFileContent = "";

  const PROMPT_BASE = `Sos un profesor experto creando un examen de práctica. Leé estos apuntes con atención y creá la mayor cantidad posible de preguntas de opción múltiple, cubriendo TODOS los conceptos, definiciones, fechas, nombres, procesos y datos que aparezcan. No omitas nada importante y no repitas el mismo concepto en dos preguntas distintas. Devolveme únicamente esto, en texto plano y sin bloques \`\`\` de markdown, sin texto antes ni después:
const PREGUNTAS = [
{ t: "¿Pregunta? ", ops: [ "Opción A ", "Opción correcta* ", "Opción C ", "Opción D "], info: "Explicación breve usando las palabras de los apuntes. " },
];
Reglas strictly:
La opción correcta lleva * pegado al final, sin espacio.
Exactamente 4 opciones por pregunta.
Las opciones incorrectas deben ser plausibles (mismo tipo de dato, época o categoría que la correcta), nunca obvias ni absurdas.
Todas las opciones de una misma pregunta deben tener una extensión similar entre sí, para que la correcta no se note por ser más larga o más detallada que el resto.
"info" debe explicar con las palabras de los apuntes, sin inventar ni agregar datos que no estén en el texto.
Variá el tipo de pregunta: definiciones, ejemplos, comparaciones, fechas, causas, consecuencias.
Comillas internas escapadas correctamente (\") para que el JavaScript sea válido.
Solo el código JavaScript, nada más.

APUNTES A ANALIZAR:
`;

  // === FETCH DE MODELOS (GET /api/v1/models o /v1/models) ===
  async function fetchModels() {
    let baseUrl = document.getElementById('serverIp').value.trim().replace(/\/+$/, "");
    const apiKey = document.getElementById('apiKey').value.trim();
    const select = document.getElementById('modelSelect');
    
    setStatus("Obteniendo modelos...", "default");
    
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

    try {
      const response = await fetch(`${baseUrl}/v1/models`, {
        method: 'GET',
        headers: headers
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const data = await response.json();
      
      select.innerHTML = '<option value="">-- Seleccionar modelo --</option>';
      
      if (data.data && data.data.length > 0) {
        data.data.forEach(model => {
          const option = document.createElement('option');
          option.value = model.id;
          option.text = model.id;
          select.appendChild(option);
        });
        select.selectedIndex = 1;
        setStatus("Modelos cargados con éxito", "success");
      } else {
        setStatus("No se encontraron modelos cargados", "error");
      }
    } catch (error) {
      console.error(error);
      setStatus("Error al cargar modelos", "error");
      alert(`No se pudo obtener la lista de modelos.\nAsegúrate de que el servidor esté encendido.\n\nError: ${error.message}`);
    }
  }

  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    document.getElementById('fileName').innerText = `Cargado: ${file.name}`;
    
    const reader = new FileReader();
    reader.onload = function(e) {
      loadedFileContent = e.target.result.replace(/[\f\v]/g, '\n').trim();
      document.getElementById('generateBtn').disabled = false;
      setStatus("Listo para enviar", "default");
    };
    reader.readAsText(file);
  }

  function setStatus(text, type) {
    const statusEl = document.getElementById('statusText');
    statusEl.innerText = text;
    statusEl.className = 'status-badge'; 
    if (type === 'success') statusEl.classList.add('success');
    if (type === 'error') statusEl.classList.add('error');
  }

  // === GENERACIÓN DE TEXTO CON STREAMING (POST /v1/chat/completions) ===
  async function processFile() {
    if (!loadedFileContent) return;

    const outputText = document.getElementById('outputText');
    const generateBtn = document.getElementById('generateBtn');

    let baseUrl = document.getElementById('serverIp').value.trim().replace(/\/+$/, "");
    const apiKey = document.getElementById('apiKey').value.trim();
    let selectedModel = document.getElementById('modelSelect').value;

    if (!selectedModel) {
      const select = document.getElementById('modelSelect');
      if (select.options.length > 1) {
        selectedModel = select.options[1].value;
        select.selectedIndex = 1;
      } else {
        selectedModel = "local-model";
      }
    }

    generateBtn.disabled = true;
    setStatus("Generando en vivo...", "default");
    outputText.value = "";

    const fullPrompt = PROMPT_BASE + loadedFileContent;

    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

    const endpoint = `${baseUrl}/v1/chat/completions`;

    const payload = {
      model: selectedModel,
      messages: [
        { role: "system", content: "Sos un asistente útil que sigue instrucciones estrictas de formato." },
        { role: "user", content: fullPrompt }
      ],
      temperature: 0.2,
      stream: true
    };

    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        const errorMsg = errorData.error?.message || errorData.message || `HTTP Status ${response.status}`;
        throw new Error(errorMsg);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let rawTextAccumulator = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split("\n");

        for (const line of lines) {
          const trimmedLine = line.trim();
          if (!trimmedLine || trimmedLine === "data: [DONE]") continue;

          if (trimmedLine.startsWith("data: ")) {
            try {
              const jsonStr = trimmedLine.replace(/^data:\s*/, "");
              const parsed = JSON.parse(jsonStr);
              const content = parsed.choices?.[0]?.delta?.content || "";
              
              if (content) {
                rawTextAccumulator += content;
                
                let cleanText = rawTextAccumulator
                  .replace(/^```javascript/i, '')
                  .replace(/^```js/i, '')
                  .replace(/^```/i, '')
                  .replace(/```$/i, '')
                  .trimStart();

                outputText.value = cleanText;
                outputText.scrollTop = outputText.scrollHeight;
              }
            } catch (e) {
              // Ignorar trozos de JSON incompletos en el stream
            }
          }
        }
      }

      setStatus("¡Examen Generado!", "success");

    } catch (error) {
      console.error(error);
      setStatus("Error en la generación", "error");
      outputText.value = `Hubo un problema al procesar la petición en: ${endpoint}\nDetalle del error: ${error.message}\n\nAsegúrate de:\n1. Hacer clic en "↻ Cargar Modelos" para asegurar que LM Studio responde.\n2. Asegurar que haya un modelo seleccionado en el desplegable.`;
    } finally {
      generateBtn.disabled = false;
    }
  }

  function copyOutput() {
    const copyText = document.getElementById("outputText");
    if (!copyText.value) return;
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Código copiado al portapapeles");
  }
</script>

</body>
</html>
