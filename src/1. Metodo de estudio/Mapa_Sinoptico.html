<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Sinoptico Estilo Escolar</title>
    <link rel="stylesheet" href="styles.css">
<style>
    :root{
        --ink: #303249;
        --muted: #777991;
        --paper: #fbfbff;
        --lilac: #eee9ff;
        --lav: #d9ceff;
        --mint: #d9f1e8;
        --line: #e8e6f1;
        --violet: #7766c9;
        --peach: #ffdcd2;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background-color: #f7f6fc;
        background-image:
            linear-gradient(#eeeafa77 1px, transparent 1px),
            linear-gradient(90deg, #eeeafa77 1px, transparent 1px);
        background-size: 28px 28px;
        background-attachment: fixed;
        margin: 0;
        padding: 0;
        color: var(--ink);
        line-height: 1.4;
        overflow-x: hidden;
    }

    .header-container {
        text-align: center;
        padding: 34px 20px 12px 20px;
        position: relative;
        z-index: 10;
    }

    h1 {
        font: 600 2.1em 'Playfair Display', serif;
        letter-spacing: -0.5px;
        margin: 8px 0;
        color: var(--ink);
        position: relative;
        display: inline-block;
    }

    h1::after { content: none; }

    #scroll-wrapper {
        width: 100%;
        height: calc(100vh - 120px);
        overflow: auto;
        position: relative;
        display: flex;
        justify-content: center;
    }

    #mapa-container {
        position: relative;
        display: inline-block;
        padding: 40px 80px;
        min-width: max-content;
        margin: 0 auto;
    }

    #svg-lines {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 0;
    }

    .nodos-wrapper {
        position: relative;
        z-index: 1;
        display: flex;
    }

    .nivel {
        display: flex;
        align-items: center;
        gap: 60px;
    }

    .hijos-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
    }

    .nodo-texto {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 18px;
        box-shadow: 0 6px 16px rgba(103, 88, 183, 0.08);
        max-width: 260px;
        font-size: 13.5px;
        font-weight: 500;
        position: relative;
        z-index: 2;
        transition: all 0.25s ease;
        transform: none !important;
    }

    .nodo-texto:hover {
        transform: translateY(-3px) !important;
        box-shadow: 0 10px 22px rgba(103, 88, 183, 0.14);
        cursor: pointer;
        z-index: 10;
        border-color: var(--lav);
    }

    .color-0 { background-color: var(--lilac); }
    .color-1 { background-color: var(--mint); }
    .color-2 { background-color: var(--peach); }
    .color-3 { background-color: #fff1dd; }
    .color-4 { background-color: #f6e5f0; }
    .color-5 { background-color: #e4f5ef; }
    .color-6 { background-color: #e8e2fb; }
    .color-7 { background-color: #fdf3e4; }
    .color-8 { background-color: #e8f0fb; }
    .color-9 { background-color: #f0eef8; }

    #nodos-wrapper > .nivel > .nodo-texto {
        background: var(--violet) !important;
        color: #fff;
        font-weight: 600;
        font-size: 14.5px;
    }

    .deco-tape::before,
    .deco-pin::after,
    .deco-clip::after {
        content: none;
    }

    .sticker { display: none; }
</style>
</head>

        // Función para actualizar el título dinámicamente
        function setTitulo(nuevoTexto) {
            document.getElementById('titulo-mapa').textContent = nuevoTexto;
            document.title = nuevoTexto;
        }

        // Inicializamos el título
        setTitulo(datosMapa.nombre);

        let nodoCounter = 0;
        const decoraciones = ['deco-tape', 'deco-pin', 'deco-clip'];
        const TOTAL_COLORES = 10;

        function generarNodo(datos, parentId = null, nivel = 0) {
            nodoCounter++;
            const currentId = `nodo-${nodoCounter}`;
            const nivelDiv = document.createElement('div');
            nivelDiv.className = 'nivel';

            const textoDiv = document.createElement('div');
            const decoAleatoria = decoraciones[Math.floor(Math.random() * decoraciones.length)];
            
            textoDiv.className = `nodo-texto color-${nivel % TOTAL_COLORES} ${decoAleatoria}`;
            textoDiv.id = currentId;
            textoDiv.innerHTML = datos.nombre;
            
            const rotacion = (Math.random() * 6 - 3).toFixed(1);
            textoDiv.style.transform = `rotate(${rotacion}deg)`;
            
            if (parentId) textoDiv.dataset.parentId = parentId;
            nivelDiv.appendChild(textoDiv);

            if (datos.hijos && datos.hijos.length > 0) {
                const hijosDiv = document.createElement('div');
                hijosDiv.className = 'hijos-container';
                datos.hijos.forEach(hijo => hijosDiv.appendChild(generarNodo(hijo, currentId, nivel + 1)));
                nivelDiv.appendChild(hijosDiv);
            }
            return nivelDiv;
        }

        document.getElementById('nodos-wrapper').appendChild(generarNodo(datosMapa, null, 0));

        // Devuelve la posicion de un nodo relativa a #mapa-container,
        // usando propiedades "offset" (layout real) en lugar de
        // getBoundingClientRect (que incluye el transform: rotate()
        // y por eso las lineas quedaban desconectadas de las tarjetas).
        function getPosRelativaAlContainer(el, container) {
            let x = 0, y = 0;
            let actual = el;
            while (actual && actual !== container) {
                x += actual.offsetLeft;
                y += actual.offsetTop;
                actual = actual.offsetParent;
            }
            return { x, y, width: el.offsetWidth, height: el.offsetHeight };
        }

        function dibujarLineas() {
            const svg = document.getElementById('svg-lines');
            const container = document.getElementById('mapa-container');
            svg.setAttribute('width', container.scrollWidth);
            svg.setAttribute('height', container.scrollHeight);
            svg.innerHTML = ''; 

            document.querySelectorAll('.nodo-texto').forEach(nodo => {
                const parentId = nodo.dataset.parentId;
                if (parentId) {
                    const parent = document.getElementById(parentId);
                    const parentPos = getPosRelativaAlContainer(parent, container);
                    const childPos = getPosRelativaAlContainer(nodo, container);

                    const startX = parentPos.x + parentPos.width;
                    const startY = parentPos.y + (parentPos.height / 2);
                    const endX = childPos.x;
                    const endY = childPos.y + (childPos.height / 2);

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${startX} ${startY} C ${startX + 50} ${startY}, ${endX - 50} ${endY}, ${endX} ${endY}`);
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke', '#a89bdc'); 
                    path.setAttribute('stroke-width', '3'); 
                    svg.appendChild(path);
                }
            });
        }

        // Redibujamos cuando las fuentes terminan de cargar
        // (si dibujamos antes, el texto cambia de tamano despues y las
        // tarjetas se mueven, dejando las lineas desalineadas) y ante
        // cualquier cambio de tamano de ventana.
        function dibujarLineasSeguro() {
            dibujarLineas();
            requestAnimationFrame(dibujarLineas);
        }

        window.addEventListener('load', dibujarLineasSeguro);
        window.addEventListener('resize', dibujarLineasSeguro);
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(dibujarLineasSeguro);
        }
    </script>
