<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Método Blurting</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap');

    /* Variables Tema Claro (Lúmina Minimal) */
    :root {
        --bg-app: #f7f6fc;
        --bg-surface: #ffffff;
        --bg-surface-alt: #f3f1fb;
        --ink: #303249;
        --muted: #777991;
        --line: #e8e6f1;
        --line-soft: #f0eef7;
        
        --violet: #7766c9;
        --violet-light: #eee9ff;
        --violet-glow: rgba(119, 102, 201, 0.15);
        
        --mint: #d9f1e8;
        --success: #2e7d32;
        --success-bg: #e8f5e9;
        --success-border: #a5d6a7;
        
        --danger: #c62828;
        --danger-bg: #ffebee;
        --danger-border: #ef9a9a;
        
        --shadow-card: 0 10px 30px rgba(119, 102, 201, 0.06);
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        --font-mono: 'DM Mono', monospace;
        --font-serif: 'Playfair Display', serif;
    }

    /* Variables Tema Oscuro Minimalista */
    [data-theme="dark"] {
        --bg-app: #121118;
        --bg-surface: #1a1924;
        --bg-surface-alt: #232130;
        --ink: #ecebfc;
        --muted: #9592a8;
        --line: #2d2a3e;
        --line-soft: #252333;
        
        --violet: #9d8ecf;
        --violet-light: #2a2542;
        --violet-glow: rgba(157, 142, 207, 0.2);
        
        --mint: #1a3a2f;
        --success: #81c784;
        --success-bg: #132a20;
        --success-border: #2e5d42;
        
        --danger: #e57373;
        --danger-bg: #2d1618;
        --danger-border: #5c282a;
        
        --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: var(--font-sans);
        background-color: var(--bg-app);
        color: var(--ink);
        line-height: 1.6;
        padding-bottom: 80px;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Header */
    .header-container { 
        text-align: center; 
        padding: 48px 20px 24px; 
        position: relative;
    }

    h1 { 
        font: 600 2.4em var(--font-serif); 
        letter-spacing: -0.5px; 
        margin: 0; 
        color: var(--ink); 
    }

    .subtitulo { 
        font: 500 11.5px var(--font-mono); 
        color: var(--violet); 
        margin-top: 10px; 
        text-transform: uppercase; 
        letter-spacing: 1.5px;
    }

    #blurting-app { 
        max-width: 800px; 
        margin: 0 auto; 
        padding: 0 20px; 
    }
    
    /* Temporizador */
    .timer-card { 
        background: var(--bg-surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 24px;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        margin-bottom: 24px; 
        box-shadow: var(--shadow-card);
    }

    .timer-display-box {
        background: var(--bg-surface-alt);
        padding: 8px 28px;
        border-radius: 14px;
        border: 1px solid var(--line);
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .timer-display { 
        font: 600 36px var(--font-mono); 
        color: var(--ink); 
        letter-spacing: -1px;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        background-color: var(--muted);
        border-radius: 50%;
        transition: all 0.3s ease;
    }

    .status-dot.active {
        background-color: var(--violet);
        box-shadow: 0 0 10px var(--violet);
    }

    /* Botones */
    .controls { 
        display: flex; 
        gap: 12px; 
        justify-content: center; 
    }

    .btn {
        background: var(--violet);
        color: #ffffff;
        border: none;
        padding: 12px 26px;
        border-radius: 12px;
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        box-shadow: 0 4px 14px var(--violet-glow);
    }

    .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.08);
    }

    .btn:active {
        transform: translateY(0);
    }

    .btn-correct {
        background: var(--bg-surface-alt);
        color: var(--ink);
        border: 1px solid var(--violet);
        box-shadow: 0 4px 16px var(--violet-glow);
    }

    .btn-correct:hover {
        background: var(--violet);
        color: #ffffff;
    }

    .btn-outline {
        background: transparent;
        color: var(--violet);
        border: 1px solid var(--line);
        box-shadow: none;
        font-size: 13px;
        padding: 8px 16px;
    }

    .btn-outline:hover {
        border-color: var(--violet);
        background: var(--violet-light);
    }

    /* Área de Escritura */
    .editor-container {
        background: var(--bg-surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow-card);
        overflow: hidden;
        transition: border-color 0.2s ease;
    }

    .editor-container:focus-within {
        border-color: var(--violet);
    }

    .editor-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 18px;
        background: var(--bg-surface-alt);
        border-bottom: 1px solid var(--line-soft);
        font: 500 11.5px var(--font-mono);
        color: var(--muted);
    }

    .editor-status {
        transition: opacity 0.3s ease;
    }

    textarea#blurting-input {
        width: 100%;
        height: 260px;
        background: transparent;
        border: none;
        padding: 20px;
        font-family: var(--font-sans);
        font-size: 15px;
        line-height: 1.65;
        color: var(--ink);
        resize: vertical;
        outline: none;
    }

    textarea#blurting-input::placeholder {
        color: var(--muted);
        opacity: 0.7;
    }

    textarea#blurting-input:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    /* Tarjeta de Resultados */
    .results-card {
        background: var(--bg-surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 28px;
        margin-top: 28px;
        box-shadow: var(--shadow-card);
        display: none;
        animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--line-soft);
        padding-bottom: 14px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .results-title { 
        font: 600 22px var(--font-serif); 
        margin: 0; 
        color: var(--ink); 
    }

    .metric-box {
        background: var(--bg-surface-alt);
        border-radius: 12px;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
        border: 1px solid var(--line-soft);
        font-size: 13px;
    }

    .metric-value {
        font: 600 16px var(--font-mono);
        color: var(--violet);
    }

    .feedback-section { margin-bottom: 22px; }
    .feedback-section h3 { 
        font-size: 12px; 
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px; 
        color: var(--muted); 
    }
    
    .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12.5px;
        font-weight: 500;
        margin: 4px;
    }
    .badge.found { 
        background: var(--success-bg); 
        color: var(--success); 
        border: 1px solid var(--success-border); 
    }
    .badge.missing { 
        background: var(--danger-bg); 
        color: var(--danger); 
        border: 1px dashed var(--danger-border); 
        text-decoration: line-through; 
        opacity: 0.8; 
    }
    
    .user-text-highlighted {
        background: var(--bg-surface-alt);
        padding: 20px;
        border-radius: 14px;
        border: 1px solid var(--line-soft);
        font-size: 14px;
        line-height: 1.65;
        white-space: pre-wrap;
        color: var(--ink);
    }
    
    .highlight-green { 
        background: var(--mint); 
        color: var(--success); 
        font-weight: 600; 
        padding: 2px 6px; 
        border-radius: 6px; 
        border: 1px solid var(--success-border);
    }

    .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--ink);
        color: var(--bg-surface);
        padding: 12px 20px;
        border-radius: 10px;
        font-size: 13px;
        font-family: var(--font-mono);
        display: none;
        box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        z-index: 100;
    }
</style>
</head>
<body>

<div class="header-container" id="header-container"></div>

<div id="blurting-app">
    <div class="timer-card">
        <div class="timer-display-box">
            <div class="status-dot" id="status-dot"></div>
            <div class="timer-display" id="timer-display">00:00</div>
        </div>
        
        <div class="controls">
            <button class="btn" id="btn-start" onclick="iniciarTemporizador()">
                Iniciar vaciado
            </button>
            <button class="btn btn-correct" id="btn-correct" onclick="corregirBlurting()" style="display:none;">
                Corregir ahora
            </button>
        </div>
    </div>

    <div class="editor-container">
        <div class="editor-meta">
            <span class="editor-status" id="editor-status">Esperando inicio</span>
            <span id="char-count">0 caracteres</span>
        </div>
        <textarea id="blurting-input" placeholder="Haz clic en 'Iniciar vaciado' para comenzar. Escribe todo lo que recuerdes del tema..." disabled oninput="alEscribir()"></textarea>
    </div>

    <div class="results-card" id="results-card">
        <div class="results-header">
            <h2 class="results-title">Análisis de Vaciado</h2>
            <button class="btn btn-outline" onclick="copiarReporteIA()">
                📋 Copiar reporte para IA
            </button>
        </div>

        <div class="metric-box">
            <span>Grado de Recuerdo:</span>
            <span class="metric-value" id="score-value">0%</span>
        </div>
        
        <div class="feedback-section">
            <h3>Conceptos Clave de Referencia</h3>
            <div id="concepts-container"></div>
        </div>

        <div class="feedback-section">
            <h3>Tu texto escrito</h3>
            <div class="user-text-highlighted" id="highlighted-text"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast">Reporte copiado al portapapeles</div>

<script>
    // =====================================================================
    // SECCIÓN MODIFICABLE POR LA IA
    // =====================================================================
    const datosBlurting = {
        tituloPagina: "Blurting",
        subtitulo: "Revolución de Mayo (Ejemplo)",
        tiempoMinutos: 5,
        conceptosClave: [
            "Semana de Mayo",
            "Cabildo Abierto",
            "25 de mayo",
            "Primera Junta",
            "Cornelio Saavedra",
            "Mariano Moreno",
            "Cisneros",
            "Monopolio comercial",
            "Rey Fernando VII"
        ]
    };
    // =====================================================================

    let reporteData = { encontrados: [], faltantes: [], textoUsuario: "" };
    let timerEscritura = null;
    const TOLERANCIA_PAUSA_MS = 1500;

    // Renderizado del Encabezado
    document.getElementById('header-container').innerHTML = `
        <h1>${datosBlurting.tituloPagina}</h1>
        <div class="subtitulo">${datosBlurting.subtitulo}</div>
    `;

    let tiempoRestante = datosBlurting.tiempoMinutos * 60;
    let intervaloTimer = null;
    const timerDisplay = document.getElementById('timer-display');
    const inputArea = document.getElementById('blurting-input');
    const statusDot = document.getElementById('status-dot');
    const editorStatus = document.getElementById('editor-status');
    
    function actualizarDisplayTimer() {
        const min = Math.floor(tiempoRestante / 60).toString().padStart(2, '0');
        const sec = (tiempoRestante % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${min}:${sec}`;
    }
    actualizarDisplayTimer();

    function alEscribir() {
        document.getElementById('char-count').textContent = `${inputArea.value.length} caracteres`;

        if (!intervaloTimer) return;

        editorStatus.textContent = "Escribiendo...";

        clearTimeout(timerEscritura);

        timerEscritura = setTimeout(() => {
            if (intervaloTimer) {
                editorStatus.textContent = "Tiempo de reflexión";
            }
        }, TOLERANCIA_PAUSA_MS);
    }

    function iniciarTemporizador() {
        if (intervaloTimer) return;
        
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('btn-correct').style.display = 'inline-flex';
        
        statusDot.classList.add('active');
        editorStatus.textContent = 'Escribe cuando desees';
        
        inputArea.disabled = false;
        inputArea.focus();

        intervaloTimer = setInterval(() => {
            tiempoRestante--;
            actualizarDisplayTimer();
            
            if (tiempoRestante <= 0) {
                clearInterval(intervaloTimer);
                corregirBlurting();
            }
        }, 1000);
    }

    function corregirBlurting() {
        clearInterval(intervaloTimer);
        clearTimeout(timerEscritura);
        intervaloTimer = null;
        
        statusDot.classList.remove('active');
        document.getElementById('btn-correct').style.display = 'none';
        editorStatus.textContent = 'Vaciado finalizado';
        inputArea.disabled = true;

        const textoUsuario = inputArea.value.trim();
        const textoNormalizado = textoUsuario.toLowerCase();
        
        const conceptosEncontrados = [];
        const conceptosFaltantes = [];
        
        datosBlurting.conceptosClave.forEach(concepto => {
            if (textoNormalizado.includes(concepto.toLowerCase())) {
                conceptosEncontrados.push(concepto);
            } else {
                conceptosFaltantes.push(concepto);
            }
        });

        reporteData = {
            encontrados: conceptosEncontrados,
            faltantes: conceptosFaltantes,
            textoUsuario: textoUsuario
        };

        const total = datosBlurting.conceptosClave.length;
        const porcentaje = total > 0 ? Math.round((conceptosEncontrados.length / total) * 100) : 0;
        document.getElementById('score-value').textContent = `${porcentaje}% (${conceptosEncontrados.length}/${total})`;

        const containerConceptos = document.getElementById('concepts-container');
        containerConceptos.innerHTML = '';
        
        conceptosEncontrados.forEach(c => {
            containerConceptos.innerHTML += `<span class="badge found">✓ ${c}</span>`;
        });
        conceptosFaltantes.forEach(c => {
            containerConceptos.innerHTML += `<span class="badge missing">✕ ${c}</span>`;
        });

        let textoResaltado = textoUsuario;
        const conceptosOrdenados = [...conceptosEncontrados].sort((a, b) => b.length - a.length);
        
        conceptosOrdenados.forEach(concepto => {
            const regex = new RegExp(`(${concepto})`, 'gi');
            textoResaltado = textoResaltado.replace(regex, `<span class="highlight-green">$1</span>`);
        });

        document.getElementById('highlighted-text').innerHTML = textoResaltado || "<em>No ingresaste texto durante la sesión.</em>";
        
        const resultsCard = document.getElementById('results-card');
        resultsCard.style.display = 'block';
        resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copiarReporteIA() {
        const textoReporte = 
`Actúa como un tutor académico experto y pedagógico especialista en técnicas de estudio activo (Blurting y Active Recall).

He realizado una sesión de Vaciado de Memoria (Blurting) sobre el tema: "${datosBlurting.subtitulo}".

### DATOS DE LA SESIÓN DE ESTUDIO:
- **Conceptos que logré recordar:**
${reporteData.encontrados.length > 0 ? reporteData.encontrados.map(c => `  * ${c}`).join('\n') : "  * Ninguno"}

- **Conceptos omitidos / validados como faltantes:**
${reporteData.faltantes.length > 0 ? reporteData.faltantes.map(c => `  * ${c}`).join('\n') : "  * Ninguno"}

- **Texto exacto escrito por mí durante el vaciado:**
"${reporteData.textoUsuario || "Sin texto registrado."}"

---

### TUS INSTRUCCIONES DE EVALUACIÓN:
1. **Evaluación de Coherencia y Precisión:** Analiza el texto que escribí. Valida si la narrativa o explicación es correcta conceptualmente o si cometí algún error argumentativo, de cronología o interpretación.
2. **Explicación Breve de los Conceptos Omitidos:** Para cada concepto que me faltó incluir, dame un resumen conciso (2 o 3 oraciones máximo por concepto) explicando su importancia dentro de este tema específico.
3. **Puntos de Conexión:** Explícame brevemente cómo se conectan los conceptos que SÍ recordé con los que OLVIDÉ.
4. **Preguntas de Afianzamiento:** Hazme 3 preguntas breves y directas para poner a prueba mi comprensión sobre las partes que omití.`;

        navigator.clipboard.writeText(textoReporte).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        });
    }
</script>

</body>
</html>
